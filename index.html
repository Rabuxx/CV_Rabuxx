<title>Baptiste Rabussier — CV Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #060d1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    padding: 2rem;
  }

  .scanlines {
    pointer-events: none;
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    z-index: 10;
  }

  .terminal {
    width: 100%;
    max-width: 860px;
    background: #0d1b2a;
    border-radius: 12px;
    border: 1px solid #1e3a5f;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(56, 139, 253, 0.08), 0 0 0 1px #1e3a5f;
  }

  .titlebar {
    background: #111f30;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #1e3a5f;
    user-select: none;
  }

  .dot { width: 13px; height: 13px; border-radius: 50%; }
  .d-red    { background: #ff5f57; }
  .d-yellow { background: #febc2e; }
  .d-green  { background: #28c840; }

  .titlebar-label {
    margin-left: 10px;
    color: #4a6a8a;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .titlebar-right {
    margin-left: auto;
    color: #2a4a6a;
    font-size: 11px;
    letter-spacing: 0.08em;
  }

  #output {
    padding: 20px 24px;
    color: #c9d8e8;
    font-size: 13.5px;
    line-height: 1.75;
    min-height: 420px;
    max-height: 60vh;
    overflow-y: auto;
  }

  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

  .line { margin-bottom: 2px; }
  .block { margin-bottom: 14px; }

  .input-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px 18px;
    border-top: 1px solid #111f30;
    background: #0a1520;
  }

  .ps1 { color: #3fb950; font-weight: 700; white-space: nowrap; font-size: 13.5px; }
  .at  { color: #58a6ff; }
  .sep { color: #4a6a8a; }

  #cmd-input {
    background: transparent;
    border: none;
    outline: none;
    color: #e6edf3;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 13.5px;
    flex: 1;
    caret-color: #3fb950;
  }

  .cursor-blink {
    display: inline-block;
    width: 8px;
    height: 15px;
    background: #3fb950;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* colors */
  .g  { color: #3fb950; }
  .b  { color: #58a6ff; }
  .y  { color: #d2a839; }
  .r  { color: #f87171; }
  .gr { color: #4a6a8a; }
  .w  { color: #e6edf3; font-weight: 500; }
  .cy { color: #39c5cf; }
  .m  { color: #d2a8ff; }

  .cmd-echo { color: #e6edf3; }

  .bar-full { color: #3fb950; }
  .bar-empty { color: #1e3a5f; }

  .tag {
    display: inline-block;
    background: #0d2137;
    border: 1px solid #1e3a5f;
    border-radius: 4px;
    padding: 1px 8px;
    font-size: 11px;
    color: #58a6ff;
    margin: 2px 3px 2px 0;
  }

  .section-title {
    color: #d2a839;
    border-bottom: 1px solid #1a3050;
    padding-bottom: 4px;
    margin-bottom: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .hint {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }

  .hint-cmd {
    background: #0d2137;
    border: 1px solid #1e3a5f;
    border-radius: 4px;
    padding: 3px 10px;
    color: #3fb950;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .hint-cmd:hover { background: #0f2a45; border-color: #3fb950; }

  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Message mobile */
  .mobile-warning {
    display: none;
    position: fixed;
    inset: 0;
    background: #060d1a;
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;

  .mobile-warning-box {

    border-radius: 10px;

  .mobile-warning-btn {

    color: #3fb950;
    font-family: inherit;
    font-size: 12px;
    padding: 8px 20px;
    cursor: pointer;
  }
  @media (max-width: 600px) {
    .mobile-warning { display: flex; }
  }

  /* Assure le clignotement sur tous les navigateurs */
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
</style>

// Échappement HTML — neutralise toute tentative d'injection XSS
function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// Détecte les patterns XSS classiques
function looksLikeXSS(str) {
  return /<|>|javascript:|onerror|onload|onclick|alert\s*\(|script|eval\s*\(|document\.|window\./i.test(str);
}

// Popup stylisée (pas un alert natif)
function showXSSWarning() {
  const existing = document.getElementById('xss-popup');
  if (existing) existing.remove();

  const popup = document.createElement('div');
  popup.id = 'xss-popup';
  popup.style.cssText = `
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #0d1b2a; border: 1px solid #f87171; border-radius: 10px;
    padding: 28px 36px; z-index: 9999; text-align: center;
    box-shadow: 0 0 40px rgba(248,113,113,0.25);
    font-family: 'JetBrains Mono', monospace; min-width: 320px;
  `;
  popup.innerHTML = `
    <div style="font-size:28px;margin-bottom:12px">🛡️</div>
    <div style="color:#f87171;font-weight:700;font-size:14px;margin-bottom:8px">TENTATIVE DÉTECTÉE</div>
    <div style="color:#c9d8e8;font-size:13px;line-height:1.7">
      Raté — je sais aussi<br>protéger mes applications 😎
    </div>
    <div style="margin-top:18px">
      <button onclick="document.getElementById('xss-popup').remove()" style="
        background:#1e3a5f;border:1px solid #f87171;border-radius:6px;
        color:#f87171;font-family:inherit;font-size:12px;
        padding:6px 20px;cursor:pointer;
      ">fermer</button>
    </div>
  `;
  document.body.appendChild(popup);

  // Auto-fermeture après 4s
  setTimeout(() => popup && popup.remove(), 4000);
}

function print(html) {
  if (html === null) return;
  const d = document.createElement('div');
  d.innerHTML = html;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

function printPrompt(cmd) {
  const d = document.createElement('div');
  d.className = 'line';
  // On échappe cmd avant injection dans le DOM
  d.innerHTML = `<span class="ps1"><span class="g">baptiste</span><span class="sep">@</span><span class="b">cv</span><span class="sep">:</span><span class="m">~</span><span class="sep">$</span></span> <span class="cmd-echo">${escapeHtml(cmd)}</span>`;
  out.appendChild(d);
}

function runCmd(cmd) {
  cmd = cmd.trim();
  if (!cmd) return;

  // Détection XSS avant tout traitement
  if (looksLikeXSS(cmd)) {
    showXSSWarning();
    inp.value = '';
    return;
  }

  history.unshift(cmd);
  histIdx = -1;
  printPrompt(cmd);
  const fn = COMMANDS[cmd];
  if (fn) {
    const result = fn();
    if (result !== null) print(result);
  } else {
    // cmd est échappé avant insertion dans le message d'erreur
    print(`<div class="block"><span class="r">bash: ${escapeHtml(cmd)}: command not found</span> — tapez <span class="g">help</span> pour voir les commandes disponibles</div>`);
  }
  out.scrollTop = out.scrollHeight;
}

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const cmd = inp.value;
    inp.value = '';
    runCmd(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; inp.value = history[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; inp.value = history[histIdx]; }
    else { histIdx = -1; inp.value = ''; }
  }
});

document.getElementById('terminal') && document.getElementById('terminal').addEventListener('click', () => inp.focus());
document.querySelector('.terminal').addEventListener('click', () => inp.focus());
