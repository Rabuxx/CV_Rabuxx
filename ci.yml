name: CI/CD — cv-terminal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint-html:
    name: Vérification HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer HTMLHint
        run: npm install -g htmlhint

      - name: Linter le HTML
        run: htmlhint index.html

  lint-js:
    name: Vérification JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer ESLint
        run: npm install -g eslint

      - name: Extraire le JS inline
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const match = html.match(/<script>([\s\S]*?)<\/script>/);
            if (match) fs.writeFileSync('extracted.js', match[1]);
            else { console.log('Aucun script trouvé'); process.exit(0); }
          "

      - name: Linter le JavaScript
        run: |
          if [ -f extracted.js ]; then
            eslint extracted.js --rule '{"no-eval": "error", "no-implied-eval": "error"}' || true
          fi

  security-scan:
    name: Scan de sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  deploy:
    name: Déploiement Vercel
    runs-on: ubuntu-latest
    needs: [lint-html, lint-js, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Installer Vercel CLI
        run: npm install -g vercel

      - name: Déployer sur Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
